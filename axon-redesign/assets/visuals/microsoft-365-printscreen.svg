<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Microsoft 365 admin screenshot style dashboard</title>
  <desc id="desc">A screenshot-style Microsoft 365 dashboard with Outlook, Teams, SharePoint and OneDrive panels.</desc>
