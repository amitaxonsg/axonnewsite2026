<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Google Workspace to Microsoft 365 migration flow</title>
  <desc id="desc">A migration diagram showing Google Workspace and Microsoft 365 mail, files, calendar and users moving in either direction.</desc>
  <rect width="1200" height="760" rx="34" fill="#f8fbff"/>
  <rect x="58" y="58" width="1084" height="644" rx="30" fill="#ffffff" stroke="#dbe5f2"/>
  <text x="96" y="116" fill="#0f172a" font-family="Arial, sans-serif" font-size="30" font-weight="700">Cloud Migration Plan</text>
  <text x="96" y="150" fill="#64748b" font-family="Arial, sans-serif" font-size="17">Google Workspace to Microsoft 365, or Microsoft 365 back to Google Workspace.</text>
  <g transform="translate(96 210)">
    <rect width="330" height="330" rx="28" fill="#eef6ff" stroke="#bfdbfe"/>
    <text x="34" y="58" fill="#174ea6" font-family="Arial, sans-serif" font-size="24" font-weight="700">Google Workspace</text>
    <circle cx="72" cy="112" r="18" fill="#ea4335"/><text x="104" y="119" fill="#334155" font-family="Arial, sans-serif" font-size="18">Gmail mailboxes</text>
    <circle cx="72" cy="166" r="18" fill="#34a853"/><text x="104" y="173" fill="#334155" font-family="Arial, sans-serif" font-size="18">Drive files</text>
    <circle cx="72" cy="220" r="18" fill="#4285f4"/><text x="104" y="227" fill="#334155" font-family="Arial, sans-serif" font-size="18">Calendar events</text>
    <circle cx="72" cy="274" r="18" fill="#fbbc04"/><text x="104" y="281" fill="#334155" font-family="Arial, sans-serif" font-size="18">Users and groups</text>
  </g>
  <g transform="translate(774 210)">
    <rect width="330" height="330" rx="28" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="34" y="58" fill="#312e81" font-family="Arial, sans-serif" font-size="24" font-weight="700">Microsoft 365</text>
    <rect x="54" y="94" width="20" height="20" fill="#f25022"/><text x="104" y="112" fill="#334155" font-family="Arial, sans-serif" font-size="18">Exchange mail</text>
    <rect x="54" y="148" width="20" height="20" fill="#7fba00"/><text x="104" y="166" fill="#334155" font-family="Arial, sans-serif" font-size="18">OneDrive files</text>
    <rect x="54" y="202" width="20" height="20" fill="#00a4ef"/><text x="104" y="220" fill="#334155" font-family="Arial, sans-serif" font-size="18">Teams and calendar</text>
    <rect x="54" y="256" width="20" height="20" fill="#ffb900"/><text x="104" y="274" fill="#334155" font-family="Arial, sans-serif" font-size="18">Users and licenses</text>
  </g>
  <g transform="translate(456 242)">
    <rect width="288" height="266" rx="28" fill="#0f274a"/>
    <text x="44" y="58" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Axon migration</text>
    <text x="44" y="98" fill="#cfe3ff" font-family="Arial, sans-serif" font-size="17">1. Audit accounts</text>
    <text x="44" y="134" fill="#cfe3ff" font-family="Arial, sans-serif" font-size="17">2. Prepare DNS</text>
    <text x="44" y="170" fill="#cfe3ff" font-family="Arial, sans-serif" font-size="17">3. Move mail and files</text>
    <text x="44" y="206" fill="#cfe3ff" font-family="Arial, sans-serif" font-size="17">4. Test and train users</text>
  </g>
  <path d="M426 370h86" stroke="#003087" stroke-width="8" stroke-linecap="round"/><path d="M512 370l-24-18v36z" fill="#003087"/>
  <path d="M774 370h-86" stroke="#003087" stroke-width="8" stroke-linecap="round"/><path d="M688 370l24-18v36z" fill="#003087"/>
</svg>
