<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Google Workspace admin screenshot style dashboard</title>
  <desc id="desc">A screenshot-style Google Workspace dashboard with Gmail, Drive, Calendar and Admin panels.</desc>
  <rect width="1200" height="760" rx="34" fill="#f8fafc"/>
  <rect x="46" y="48" width="1108" height="664" rx="28" fill="#ffffff" stroke="#dbe5f2"/>
  <rect x="46" y="48" width="1108" height="72" rx="28" fill="#ffffff"/>
  <circle cx="92" cy="84" r="19" fill="#4285f4"/><circle cx="116" cy="84" r="19" fill="#34a853"/><circle cx="140" cy="84" r="19" fill="#fbbc04"/><circle cx="164" cy="84" r="19" fill="#ea4335"/>
  <text x="204" y="92" fill="#202124" font-family="Arial, sans-serif" font-size="26" font-weight="700">Google Workspace Admin</text>
  <rect x="84" y="154" width="242" height="498" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="112" y="196" fill="#334155" font-family="Arial, sans-serif" font-size="18" font-weight="700">Apps</text>
  <g font-family="Arial, sans-serif" font-size="17" fill="#334155">
