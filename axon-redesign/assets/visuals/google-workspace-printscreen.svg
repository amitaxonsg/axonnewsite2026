    <text x="28" y="42" fill="#202124" font-family="Arial, sans-serif" font-size="20" font-weight="700">Drive Storage</text>
    <rect x="28" y="76" width="230" height="18" rx="9" fill="#e2e8f0"/><rect x="28" y="76" width="138" height="18" rx="9" fill="#4285f4"/>
    <text x="28" y="128" fill="#334155" font-family="Arial, sans-serif" font-size="17">Shared drives organized</text>
    <text x="28" y="162" fill="#334155" font-family="Arial, sans-serif" font-size="17">Staff access reviewed</text>
