<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Axon business email hosting monitoring dashboard</title>
  <desc id="desc">A dark Axon 1ProIT server and email hosting monitoring dashboard with gauges, CPU, RAM and network metrics.</desc>
  <rect width="1200" height="760" rx="34" fill="#0b1111"/>
