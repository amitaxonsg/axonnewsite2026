<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Technology strategy roadmap dashboard</title>
  <desc id="desc">A practical IT and AI roadmap showing priorities, budget, risk and implementation phases.</desc>
  <defs>
