      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <rect x="54" y="54" width="1092" height="652" rx="28" fill="#ffffff" filter="url(#shadow)"/>
