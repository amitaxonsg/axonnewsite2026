      <text x="34" y="116">Admin access, MFA and staff roles</text><text x="844" y="116" fill="#f59e0b" font-weight="700">Review</text>
      <text x="34" y="160">Backup, recovery and monitoring</text><text x="844" y="160" fill="#ef4444" font-weight="700">Action</text>
      <text x="34" y="204">AI usage policy and data protection</text><text x="844" y="204" fill="#f59e0b" font-weight="700">Review</text>
    </g>
