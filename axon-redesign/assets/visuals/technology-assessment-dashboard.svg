<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Technology assessment dashboard</title>
  <desc id="desc">A dashboard showing technology health, risk, cost, security and readiness scores.</desc>
  <rect width="1200" height="760" rx="34" fill="#f4f8ff"/>
  <rect x="48" y="48" width="1104" height="664" rx="30" fill="#ffffff" stroke="#dbe5f2"/>
  <rect x="48" y="48" width="1104" height="82" rx="30" fill="#0b1f3a"/>
  <text x="86" y="100" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="700">Technology Assessment</text>
  <text x="902" y="98" fill="#b8d4ff" font-family="Arial, sans-serif" font-size="17">Owner-ready summary</text>
  <g transform="translate(86 166)">
    <rect width="250" height="210" rx="22" fill="#f8fafc" stroke="#dbe5f2"/>
    <text x="24" y="38" fill="#003087" font-family="Arial, sans-serif" font-size="18" font-weight="700">Overall Health</text>
    <circle cx="126" cy="126" r="66" fill="none" stroke="#dbe5f2" stroke-width="18"/>
    <path d="M126 60a66 66 0 1 1-61 91" fill="none" stroke="#22c55e" stroke-width="18" stroke-linecap="round"/>
    <text x="94" y="139" fill="#0f172a" font-family="Arial, sans-serif" font-size="36" font-weight="700">82</text>
    <text x="140" y="139" fill="#64748b" font-family="Arial, sans-serif" font-size="17">%</text>
  </g>
  <g transform="translate(366 166)">
    <rect width="250" height="210" rx="22" fill="#f8fafc" stroke="#dbe5f2"/>
    <text x="24" y="38" fill="#003087" font-family="Arial, sans-serif" font-size="18" font-weight="700">Risk Areas</text>
    <g font-family="Arial, sans-serif" font-size="15" fill="#334155">
      <text x="24" y="80">Backups</text><rect x="116" y="66" width="92" height="12" rx="6" fill="#ef4444"/><rect x="208" y="66" width="20" height="12" rx="6" fill="#e2e8f0"/>
      <text x="24" y="118">Email DNS</text><rect x="116" y="104" width="126" height="12" rx="6" fill="#f59e0b"/>
      <text x="24" y="156">Passwords</text><rect x="116" y="142" width="72" height="12" rx="6" fill="#ef4444"/><rect x="188" y="142" width="54" height="12" rx="6" fill="#e2e8f0"/>
      <text x="24" y="194">Hosting</text><rect x="116" y="180" width="148" height="12" rx="6" fill="#22c55e"/>
    </g>
  </g>
  <g transform="translate(646 166)">
    <rect width="250" height="210" rx="22" fill="#f8fafc" stroke="#dbe5f2"/>
    <text x="24" y="38" fill="#003087" font-family="Arial, sans-serif" font-size="18" font-weight="700">Monthly Spend</text>
    <rect x="32" y="68" width="36" height="102" rx="8" fill="#60a5fa"/>
    <rect x="88" y="96" width="36" height="74" rx="8" fill="#34d399"/>
    <rect x="144" y="52" width="36" height="118" rx="8" fill="#f97316"/>
    <rect x="200" y="118" width="36" height="52" rx="8" fill="#a78bfa"/>
    <text x="28" y="194" fill="#64748b" font-family="Arial, sans-serif" font-size="13">Apps</text>
    <text x="82" y="194" fill="#64748b" font-family="Arial, sans-serif" font-size="13">Email</text>
    <text x="136" y="194" fill="#64748b" font-family="Arial, sans-serif" font-size="13">Cloud</text>
    <text x="194" y="194" fill="#64748b" font-family="Arial, sans-serif" font-size="13">AI</text>
  </g>
  <g transform="translate(926 166)">
    <rect width="180" height="210" rx="22" fill="#f8fafc" stroke="#dbe5f2"/>
    <text x="22" y="38" fill="#003087" font-family="Arial, sans-serif" font-size="18" font-weight="700">Readiness</text>
    <text x="22" y="92" fill="#0f172a" font-family="Arial, sans-serif" font-size="44" font-weight="700">Good</text>
    <text x="22" y="130" fill="#475569" font-family="Arial, sans-serif" font-size="16">Fix basics before</text>
    <text x="22" y="154" fill="#475569" font-family="Arial, sans-serif" font-size="16">adding more tools.</text>
  </g>
  <g transform="translate(86 424)">
